services:
  postgres:
    image: postgres:16-alpine
    container_name: banasat_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-banasat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-banasat_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-banasat}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - banasat_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-banasat} -d ${POSTGRES_DB:-banasat}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - banasat_network

  # Veritabanını görsel olarak yönetmek için (opsiyonel).
  # http://localhost:5050 adresinden erişilir.
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: banasat_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@banasat.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - banasat_network

volumes:
  banasat_pgdata:
    name: banasat_pgdata

networks:
  banasat_network:
    name: banasat_network
    driver: bridge
